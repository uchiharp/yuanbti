# model-mapping.conf — 模型映射（后端 × 角色 → 模型名）
# 格式：backend.agent_id=model_name
# backend: claude / codex / openclaw
# agent_id: dev1/dev2/dev3/qa/architect/pm/coordinator 或 default

# Claude Code (acpx)
claude.default=mimo-v2.5-pro
claude.dev1=mimo-v2.5-pro
claude.dev2=mimo-v2.5-pro
claude.dev3=mimo-v2.5-pro
claude.qa=mimo-v2.5-pro
claude.architect=mimo-v2.5-pro

# Codex
codex.default=o3
codex.dev1=o3
codex.qa=o3

# OpenClaw
openclaw.default=
openclaw.dev1=
openclaw.qa=
