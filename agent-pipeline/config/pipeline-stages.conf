# pipeline-stages.conf — 阶段配置（pipeline-check.sh + stage md 共用）
# 格式：KEY=VALUE，# 开头为注释
# 修改此处即同时生效于脚本和文档，无需同步两份

# ─── 阶段产出物 + 最低行数 ───
# 格式：PHASE_<编号>_FILE=<文件名>:<最低行数>
# pipeline-check.sh 的 get_phase_file() 读取此处

PHASE_0_FILE=PROJECT-PLAN.md:20
PHASE_1_FILE=PRD.md:200
PHASE_1.5_FILE=cross-review-pm.md:50
PHASE_1.6_FILE=prd-feedback.md:10
PHASE_2_FILE=ARCHITECTURE.md:100
PHASE_2.5_FILE=cross-review-arch.md:40
PHASE_2.6_FILE=architecture-feedback.md:10
PHASE_3_FILE=UX-DESIGN.md:80
PHASE_3.5_FILE=cross-review-ux-to-ui.md:20
PHASE_4_FILE=UI-DESIGN.md:80
PHASE_4.5_FILE=cross-review-ui-to-ux.md:20
PHASE_5_FILE=TASK-LIST.md:50
PHASE_5.5_FILE=confirm-tasks.md:20
PHASE_8.5_FILE=pm-acceptance.md:30
PHASE_9_FILE=ACCEPTANCE-REPORT.md:50

# ─── 交叉评审角色 ───
# 格式：REVIEW_<阶段>_ROLES=<角色1>,<角色2>,...
# 中文角色名，和产出文档中的 ## 标题一致

REVIEW_1.5_ROLES=架构师,QA,开发1,开发2
REVIEW_2.5_ROLES=开发1,开发2,QA,PM

# ─── 复审角色 ───
# 格式：REVIEW_<阶段>_REREVIEW_ROLES=<角色1>,<角色2>,...

REREVIEW_PM_ROLES=架构师,QA,开发1,开发2
REREVIEW_ARCH_ROLES=开发1,开发2,QA,PM
REREVIEW_UX_ROLES=PM
REREVIEW_UI_ROLES=PM,开发
REREVIEW_CODE_ROLES=架构师,QA,PM,开发2

# ─── 测试日志配置 ───
# 测试执行时是否自动捕获错误日志
TEST_LOG_CAPTURE=true
# 单元测试日志保留目录（相对于项目目录）
UNIT_TEST_LOG_DIR=logs/unit
# 集成测试日志保留目录
INTEGRATION_TEST_LOG_DIR=logs/integration
# E2E 测试日志保留目录
E2E_TEST_LOG_DIR=logs/e2e
# 日志保留天数
TEST_LOG_RETENTION_DAYS=7

# ─── 错误监控配置 ───
# 测试期间是否自动启动前后端错误监控
TEST_ERROR_MONITOR=true
# 错误监控输出目录（相对于项目目录）
ERROR_MONITOR_DIR=pipeline/8/error-monitor
# 后端日志文件路径（留空则自动检测）
BACKEND_LOG_PATH=

# ─── 测试独立性配置 ───
# 测试审查时是否检查测试独立性（自包含 fixture、数据唯一化、无链式依赖）
TEST_INDEPENDENCE_CHECK=true
# test-plan TC 追溯检查（测试用例必须对应 test-plan.md 中的 TC-xxx）
TEST_TRACEABILITY_CHECK=true
