# pipeline-groups.conf — 阶段组定义
# 格式: GROUP_<名称>=<阶段列表>
# 阶段后缀: [S]=small [M]=medium [L]=large [R]=risk-flagged
# 无后缀 = 所有规模都执行
# pipeline.sh 自动读取此配置按规模裁剪

GROUP_requirements=0,1,1.5[M,L],1.6,1.7[M,L],1.8[M,L],1.9[M,L]
GROUP_design=2,2.5[M,L],2.6[M,L],2.8[L,R]
GROUP_development=5,5.5[M,L],6,6.3[M,L],6.5[M,L]
GROUP_quality=7-test-review[L],7,8,8.5[M,L]
GROUP_delivery=9,10
