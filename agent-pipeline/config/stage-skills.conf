# stage-skills.conf — 阶段 → 必须加载的 Skill 映射
# 格式：STAGE_<编号>_SKILLS=<skill1>,<skill2>,...
# dispatch.sh 自动读取，注入 prompt 第一行强制加载
# 修改此处即改变 agent 实际加载的 skill，无需改 stage md

# 阶段0：项目启动
STAGE_0_SKILLS=

# 阶段1：PRD 编写
STAGE_1_SKILLS=requirements-analysis

# 阶段1.5：PRD 交叉评审
STAGE_1.5_SKILLS=

# 阶段1.6：PRD 用户审阅
STAGE_1.6_SKILLS=

# 阶段1.7：UI/UX 设计（新增）
STAGE_1.7_SKILLS=ui-ux-design,feature-tagging

# 阶段1.8：PRD 反向细化（新增）
STAGE_1.8_SKILLS=prd-refinement,feature-tagging

# 阶段1.9：细化 PRD 人工确认（新增）
STAGE_1.9_SKILLS=feature-tagging

# 阶段2：架构设计
STAGE_2_SKILLS=tech-architecture,logging-exception,engineering-robustness

# 阶段2.5：架构交叉评审
STAGE_2.5_SKILLS=engineering-robustness,architecture-review

# 阶段2.6：架构用户确认
STAGE_2.6_SKILLS=

# 阶段2.8：技术 Spike
STAGE_2.8_SKILLS=tech-spike

# 阶段5：任务分解
STAGE_5_SKILLS=task-decomposition
STAGE_5_QA_SKILLS=qa-workflow

# 阶段5.5：测试计划 + 接口契约
STAGE_5.5_SKILLS=qa-workflow

# 阶段6：开发执行
STAGE_6_SKILLS=code-quality-guard,logging-exception,engineering-robustness
STAGE_6_QA_SKILLS=qa-workflow

# 阶段6.3：协调者技术审查
STAGE_6.3_SKILLS=engineering-robustness

# 阶段6.5：PM 业务审查
STAGE_6.5_SKILLS=code-review-checklist

# 阶段7：代码审查
STAGE_7_ARCH_SKILLS=code-review-checklist,logging-exception,engineering-robustness
