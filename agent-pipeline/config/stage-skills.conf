# stage-skills.conf — 阶段 → 必须加载的 Skill 映射
# 格式：STAGE_<编号>_SKILLS=<skill1>,<skill2>,...
# dispatch.sh 自动读取，注入 prompt 第一行强制加载
# 修改此处即改变 agent 实际加载的 skill，无需改 stage md

# 阶段0：项目启动
STAGE_0_SKILLS=

# 阶段1：PRD 编写
STAGE_1_SKILLS=

# 阶段1.5：PRD 交叉评审
STAGE_1.5_SKILLS=

# 阶段1.6：PRD 用户审阅
STAGE_1.6_SKILLS=

# 阶段2：架构设计
