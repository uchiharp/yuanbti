# 阶段2.5：架构交叉评审
STAGE_2.5_SKILLS=engineering-robustness

# 阶段2.6：架构用户确认
STAGE_2.6_SKILLS=

# 阶段3：UX 设计
STAGE_3_SKILLS=

# 阶段3.5：UX 交叉评审
STAGE_3.5_SKILLS=

# 阶段4：UI 设计
STAGE_4_SKILLS=

# 阶段4.5：UI 交叉评审
